<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>UPR — Тренировка</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />
  <link rel="stylesheet" href="../design-system/style.css" />

  <style>
    /* Mockup-only layout. Composes Lucent variables + the .icon-btn
       family added in EP-web-skeleton.md Phase 5. */
    body {
      min-height: 100vh;
      background: var(--color-bg);
      display: flex;
      justify-content: center;
    }
    .phone {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      background: var(--color-bg);
      padding: var(--space-2xl) var(--space-md) var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-xl);
    }

    /* Header block */
    .workout-header {
      display: flex;
      flex-direction: column;
      gap: var(--space-2xs);
      padding: 0 var(--space-2xs);
    }
    .workout-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--color-text);
      line-height: 1.15;
    }
    .workout-meta {
      font-size: 14px;
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .workout-meta .dot {
      width: 3px;
      height: 3px;
      background: var(--color-text-secondary);
      border-radius: var(--radius-full);
      display: inline-block;
    }

    /* Exercise list */
    .exercise-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .exercise-card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      min-height: 64px;
    }
    .exercise-number {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--color-surface-hover);
      color: var(--color-text-secondary);
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .exercise-name {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.3;
    }
    .exercise-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2xs);
      flex-shrink: 0;
    }
    /* Local override only for the chevron glyph size — the .icon-btn
       wrapping it owns shape, color, and tap target. */
    .exercise-chevron .msr { font-size: 24px; }
  </style>
</head>
<body>
  <main class="phone">

    <!-- HEADER: workout name + date + exercise counter (workout.md § Workout screen anatomy) -->
    <header class="workout-header">
      <h1 class="workout-name">Вайбкодинговая тренировка</h1>
      <div class="workout-meta">
        <span>19.04.2026</span>
        <span class="dot" aria-hidden="true"></span>
        <span>3 упражнения</span>
      </div>
    </header>

    <!-- EXERCISE LIST: fixed order from workout.md (deadlift → lat pulldown → biceps curl) -->
    <section class="exercise-list" aria-label="Упражнения">

      <!-- Card 1 -->
      <article class="exercise-card">
        <span class="exercise-number" aria-label="Упражнение 1">1</span>
        <span class="exercise-name">Румынская тяга со штангой</span>
        <div class="exercise-actions">
          <!-- Info icon → tap opens technique pop-up (see technique-popup.html) -->
          <button type="button" class="icon-btn icon-btn--md icon-btn--neutral" aria-label="Описание техники">
            <span class="msr">info</span>
          </button>
          <!-- Chevron → tap opens per-exercise chat (Phase 3 mockups) -->
          <span class="icon-btn icon-btn--md icon-btn--neutral exercise-chevron" aria-hidden="true">
            <span class="msr">chevron_right</span>
          </span>
        </div>
      </article>

      <!-- Card 2 -->
      <article class="exercise-card">
        <span class="exercise-number" aria-label="Упражнение 2">2</span>
        <span class="exercise-name">Вертикальная тяга блока к груди</span>
        <div class="exercise-actions">
          <button type="button" class="icon-btn icon-btn--md icon-btn--neutral" aria-label="Описание техники">
            <span class="msr">info</span>
          </button>
          <span class="icon-btn icon-btn--md icon-btn--neutral exercise-chevron" aria-hidden="true">
            <span class="msr">chevron_right</span>
          </span>
        </div>
      </article>

      <!-- Card 3 -->
      <article class="exercise-card">
        <span class="exercise-number" aria-label="Упражнение 3">3</span>
        <span class="exercise-name">Подъём гантелей на бицепс</span>
        <div class="exercise-actions">
          <button type="button" class="icon-btn icon-btn--md icon-btn--neutral" aria-label="Описание техники">
            <span class="msr">info</span>
          </button>
          <span class="icon-btn icon-btn--md icon-btn--neutral exercise-chevron" aria-hidden="true">
            <span class="msr">chevron_right</span>
          </span>
        </div>
      </article>

    </section>

  </main>
</body>
</html>
